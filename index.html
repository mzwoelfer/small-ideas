<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martin's Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["IBM Plex Sans", "sans-serif"],
              mono: ["IBM Plex Mono", "monospace"],
            },
            colors: {
              ink: "#1a1a1a",
              muted: "#6b6b6b",
              rule: "#e2e2e2",
              accent: "#2563eb",
              tag: "#f0f4ff",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "IBM Plex Sans", sans-serif;
      }
      .post-card {
        border-bottom: 1px solid #e2e2e2;
      }
      .post-card:last-child {
        border-bottom: none;
      }
      .tag {
        font-family: "IBM Plex Mono", monospace;
      }
      input::placeholder {
        color: #aaa;
      }
      .hidden-post {
        display: none;
      }
    </style>
  </head>
  <body class="bg-white text-ink max-w-2xl mx-auto px-6 py-16">
    <!-- Header -->
    <header class="mb-12">
      <h1 class="text-2xl font-semibold tracking-tight mb-1">Martin's Notes</h1>
      <p class="text-muted text-sm">Chaotic in practice</p>
    </header>

    <!-- Search -->
    <div class="mb-10">
      <input
        id="search"
        type="text"
        placeholder="Search articles..."
        class="w-full border border-rule rounded px-4 py-2.5 text-sm font-mono focus:outline-none focus:border-accent transition-colors"
        oninput="filterPosts(this.value)"
      />
    </div>

    <!-- Post list -->
    <main id="post-list" class="divide-y divide-rule">
      <p class="text-muted text-sm py-4" id="loading">Loading posts…</p>
    </main>

    <footer
      class="mt-16 pt-8 border-t border-rule text-xs text-muted font-mono"
    >
      <a
        href="https://github.com/yourusername/blog"
        class="hover:text-accent transition-colors"
        >github</a
      >
      &nbsp;·&nbsp; built with marked.js + tailwind
    </footer>

    <script>
      let allPosts = [];

      async function loadPosts() {
        const res = await fetch("posts/manifest.json");
        allPosts = await res.json();
        renderPosts(allPosts);
      }

      function renderPosts(posts) {
        const container = document.getElementById("post-list");
        if (posts.length === 0) {
          container.innerHTML =
            '<p class="text-muted text-sm py-4">No articles found.</p>';
          return;
        }
        container.innerHTML = posts
          .map(
            (post) => `
        <article class="post-card py-6">
          <div class="flex items-baseline justify-between gap-4 mb-1">
            <a href="post.html?slug=${post.slug}"
               class="text-base font-semibold hover:text-accent transition-colors leading-snug">
              ${post.title}
            </a>
            <time class="text-xs text-muted font-mono whitespace-nowrap">${formatDate(post.date)}</time>
          </div>
          <p class="text-sm text-muted mb-3 leading-relaxed">${post.description}</p>
          <div class="flex flex-wrap gap-1.5">
            ${post.tags
              .map(
                (t) => `
              <span class="tag text-xs px-2 py-0.5 bg-tag text-accent rounded">${t}</span>
            `,
              )
              .join("")}
          </div>
        </article>
      `,
          )
          .join("");
      }

      function filterPosts(query) {
        const q = query.toLowerCase();
        if (!q) {
          renderPosts(allPosts);
          return;
        }
        const filtered = allPosts.filter(
          (p) =>
            p.title.toLowerCase().includes(q) ||
            p.description.toLowerCase().includes(q) ||
            p.tags.some((t) => t.toLowerCase().includes(q)),
        );
        renderPosts(filtered);
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr + "T12:00:00");
        return d.toLocaleDateString("en-GB", {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }

      loadPosts();
    </script>
  </body>
</html>
